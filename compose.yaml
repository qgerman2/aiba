services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://myuser:mypass@db:5432/postgres
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      HF_HOME: /models/huggingface
      TORCH_HOME: /models/torch
    ports:
      - "8000:8000"
    volumes:
      - backend-media:/app/media
      - model-cache:/models
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres-data:
  backend-media:
  model-cache:
